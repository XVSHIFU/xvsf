name: Validate and deploy Hugo site

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
    inputs:
      payload:
        description: Pages CMS action context (JSON)
        required: false
        type: string
        default: "{}"

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: npm

      - name: Install validation dependencies
        run: npm ci

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@cf03c8dbc2af2ee77af72f7b8c9f61b797dc7d38 # v3.2.0
        with:
          hugo-version: "0.162.0"
          extended: true

      - name: Validate Front Matter
        run: npm run frontmatter:check

      - name: Validate CMS configuration
        run: npm run cms:check

      - name: Build site
        run: hugo --minify --panicOnWarning --cleanDestinationDir --destination .ci-site/xvsf

      - name: Validate generated HTML
        run: npm run validate:html

      - name: Check local links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          lycheeVersion: "v0.24.2"
          args: >-
            --offline
            --root-dir "${{ github.workspace }}/.ci-site"
            --index-files index.html
            --remap "^https://xvshifu\.github\.io/xvsf file://${{ github.workspace }}/.ci-site/xvsf"
            --no-progress
            '.ci-site/xvsf/**/*.html'
          fail: true

      - name: Upload Pages artifact
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./.ci-site/xvsf

  deploy:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
