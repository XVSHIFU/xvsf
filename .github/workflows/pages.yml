name: Validate and deploy Hugo site

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      payload:
        description: Pages CMS action context (JSON)
        required: false
        type: string
        default: "{}"

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: npm

      - name: Install validation dependencies
        run: npm ci

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@aa6d1f754da6d11b067cadcbbab844c131535da1 # v3.2.0
        with:
          hugo-version: "0.162.0"
          extended: true

      - name: Determine changed posts
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PAGES_CMS_PAYLOAD: ${{ inputs.payload }}
        shell: bash
        run: |
          set -euo pipefail
          : > .changed-posts.txt
          if [[ "$EVENT_NAME" == "pull_request" && -n "${BASE_SHA:-}" ]]; then
            git diff --name-only "$BASE_SHA" "$GITHUB_SHA" -- content/posts > .changed-posts.txt
          elif [[ "$EVENT_NAME" == "push" && -n "${BEFORE_SHA:-}" && ! "$BEFORE_SHA" =~ ^0+$ ]]; then
            git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" -- content/posts > .changed-posts.txt
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            node -e 'const p=JSON.parse(process.env.PAGES_CMS_PAYLOAD||"{}"); const v=p?.context?.path||""; if(v.startsWith("content/posts/")) process.stdout.write(v+"\n")' > .changed-posts.txt
          fi
          {
            echo 'QUALITY_CHANGED_FILES<<EOF'
            cat .changed-posts.txt
            echo EOF
          } >> "$GITHUB_ENV"

      - name: Validate Front Matter
        run: npm run frontmatter:check

      - name: Validate CMS configuration
        run: npm run cms:check

      - name: Validate content quality
        run: npm run quality:check -- --external-output .quality/external-urls.txt

      - name: Verify scheduling behavior
        run: npm run schedule:test

      - name: Detect changed external links
        id: external
        shell: bash
        run: |
          if [[ -s .quality/external-urls.txt ]]; then echo 'has_urls=true' >> "$GITHUB_OUTPUT"; else echo 'has_urls=false' >> "$GITHUB_OUTPUT"; fi

      - name: Check changed external links
        if: steps.external.outputs.has_urls == 'true'
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          lycheeVersion: "v0.24.2"
          args: >-
            --files-from .quality/external-urls.txt
            --max-retries 2
            --timeout 20
            --no-progress
          format: json
          output: .quality/lychee-external.json
          fail: false

      - name: Enforce definitive external failures
        if: steps.external.outputs.has_urls == 'true'
        run: node scripts/check-lychee-report.mjs .quality/lychee-external.json

      - name: Build site
        run: hugo --minify --panicOnWarning --cleanDestinationDir --destination .ci-site/xvsf

      - name: Validate generated HTML
        run: npm run validate:html

      - name: Check local links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          lycheeVersion: "v0.24.2"
          args: >-
            --offline
            --root-dir "${{ github.workspace }}/.ci-site"
            --index-files index.html
            --remap "^https://xvshifu\.github\.io/xvsf file://${{ github.workspace }}/.ci-site/xvsf"
            --exclude 'image-20260308140255683\.png'
            --exclude 'image-20250616155711895\.png'
            --exclude 'image-20260528152628001\.png'
            --no-progress
            '.ci-site/xvsf/**/*.html'
          fail: true

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./.ci-site/xvsf

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
