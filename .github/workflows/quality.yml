name: Full content quality report
on:
  workflow_dispatch:
    inputs:
      payload:
        description: Pages CMS action context (JSON)
        required: false
        type: string
        default: "{}"

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          cache: npm
      - run: npm ci
      - name: Generate quality and image reports
        run: npm run quality:report -- --json-output .quality/image-audit.json
      - name: Upload reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: content-quality-report
          path: .quality/
          if-no-files-found: error
          retention-days: 30
