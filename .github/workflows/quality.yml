name: Full content quality report
on:
  workflow_dispatch:
    inputs:
      payload:
        description: Pages CMS action context (JSON)
        required: false
        type: string
        default: "{}"

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - run: npm ci
      - name: Generate quality and image reports
        run: npm run quality:report -- --json-output .quality/image-audit.json
      - name: Upload reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: content-quality-report
          path: .quality/
          if-no-files-found: error
          retention-days: 30
