name: Weekly external link report
on:
  schedule:
    - cron: "17 19 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          cache: npm
      - run: npm ci
      - name: Collect all external links
        run: npm run quality:report -- --all-external --external-output .quality/all-external-urls.txt --json-output .quality/image-audit.json
      - name: Check all external links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          lycheeVersion: "v0.24.2"
          args: >-
            --files-from .quality/all-external-urls.txt
            --max-retries 2
            --timeout 20
            --no-progress
          format: json
          output: .quality/weekly-external-links.json
          fail: false
      - name: Upload weekly report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: weekly-external-links
          path: .quality/
          if-no-files-found: error
          retention-days: 30
