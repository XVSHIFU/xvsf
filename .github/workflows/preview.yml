name: Build protected draft preview

on:
  workflow_dispatch:
    inputs:
      payload:
        description: Pages CMS action context (JSON)
        required: false
        type: string
        default: "{}"

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-cms-preview
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-24.04
    environment:
      name: preview
      url: ${{ steps.preview-url.outputs.url }}
    env:
      PREVIEW_BASE_URL: https://cms-preview.xvshifu-xvsf-preview.pages.dev/
      PAGES_CMS_PAYLOAD: ${{ inputs.payload }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - run: npm ci
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@aa6d1f754da6d11b067cadcbbab844c131535da1 # v3.2.0
        with:
          hugo-version: "0.162.0"
          extended: true
      - name: Select current entry
        shell: bash
        run: |
          node -e 'const fs=require("fs"); const p=JSON.parse(process.env.PAGES_CMS_PAYLOAD||"{}"); const v=p?.context?.path||""; fs.appendFileSync(process.env.GITHUB_ENV, `QUALITY_CHANGED_FILES<<EOF\n${v}\nEOF\n`);'
      - name: Run blocking checks
        run: npm run quality:check
      - name: Build all preview content
        run: >-
          hugo --minify --panicOnWarning --cleanDestinationDir
          --buildDrafts --buildFuture --buildExpired
          --baseURL "$PREVIEW_BASE_URL"
          --destination .preview-site
      - name: Add preview indexing controls
        shell: bash
        run: |
          printf 'User-agent: *\nDisallow: /\n' > .preview-site/robots.txt
          printf '/*\n  X-Robots-Tag: noindex, nofollow\n' > .preview-site/_headers
      - name: Deploy Cloudflare Pages preview
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.113.0"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy .preview-site --project-name=xvshifu-xvsf-preview --branch=cms-preview --commit-dirty=true
      - name: Resolve entry preview URL
        id: preview-url
        run: node scripts/preview-url.mjs
      - name: Publish preview links
        env:
          ENTRY_URL: ${{ steps.preview-url.outputs.url }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          {
            echo '## 受保护的草稿预览'
            echo
            echo "- 当前文章：[$ENTRY_URL]($ENTRY_URL)"
            echo "- 本次部署：[$DEPLOYMENT_URL]($DEPLOYMENT_URL)"
            echo
            echo '访问时需要通过 Cloudflare Access 邮箱验证码。'
          } >> "$GITHUB_STEP_SUMMARY"
