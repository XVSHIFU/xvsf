server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://39.106.48.91$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/39.106.48.91/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/39.106.48.91/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=86400" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; form-action 'self' https://github.com; frame-ancestors 'none'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://api.github.com https://github.com https://raw.githubusercontent.com https://uploads.github.com; media-src 'self' data: blob: https:; worker-src 'self' blob:; frame-src https://xvshifu.github.io" always;

    root /var/www;

    location = / {
        return 404;
    }

    location = /robots.txt {
        try_files /cms/robots.txt =404;
    }

    location = /cms {
        return 308 /cms/;
    }

    location ^~ /cms/ {
        auth_basic "xvsf CMS";
        auth_basic_user_file /etc/nginx/.xvsf-cms.htpasswd;
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ =404;
    }
}
