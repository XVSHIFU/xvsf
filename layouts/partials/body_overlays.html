<!-- Body-level UI overlays must not be rendered inside <head>. -->
<div id="lightbox-overlay" class="lightbox-overlay" aria-hidden="true" hidden inert>
    <button class="lightbox-close" type="button" aria-label="关闭图片预览">&times;</button>
    <button class="lightbox-nav lightbox-prev" type="button" aria-label="上一张图片">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <img class="lightbox-img" src="data:image/gif;base64,R0lGODlhAQABAAAAACw=" alt="">
    <button class="lightbox-nav lightbox-next" type="button" aria-label="下一张图片">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
</div>

<div class="progress-bar" role="progressbar" aria-label="阅读进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
