<!-- 1. 代码块折叠与复制功能 (保持不变) -->
<!-- ========================================== -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 恢复：点击整个 code header 区域也可折叠/展开（保留 toggle-btn 的独立行为）
    document.querySelectorAll('.code-header').forEach(header => {
        header.addEventListener('click', (e) => {
            // 点击复制按钮不触发折叠
            if (e.target.closest('.copy-btn')) return;
            // 如果点击的是 toggle-btn，交由 toggle-btn 自己处理（它会 stopPropagation）
            if (e.target.closest('.toggle-btn')) return;
            const container = header.parentElement;
            const isExpanded = container.getAttribute('data-expanded') === 'true';
            const next = !isExpanded;
            container.setAttribute('data-expanded', next);
            container.setAttribute('aria-expanded', next);
            const toggle = container.querySelector('.toggle-btn');
            if (toggle) toggle.setAttribute('aria-expanded', String(next));
        });
    });

    // 处理折叠功能：保留 toggle 按钮的专属监听（防止事件冒泡导致冲突）
    document.querySelectorAll('.code-block-container .toggle-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const container = btn.closest('.code-block-container');
            const isExpanded = container.getAttribute('data-expanded') === 'true';
            const next = !isExpanded;
            container.setAttribute('data-expanded', next);
            container.setAttribute('aria-expanded', next);
            // 同步按钮的 aria-expanded
            btn.setAttribute('aria-expanded', String(next));
        });
    });

    // 处理复制功能，提供 navigator.clipboard 的降级方案
    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const container = btn.closest('.code-block-container');
            const codeEl = container && container.querySelector('code');
            const code = codeEl ? codeEl.innerText : '';
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(code);
                } else {
                    const ta = document.createElement('textarea');
                    ta.value = code;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    ta.remove();
                }
                const originalLabel = btn.getAttribute('aria-label') || '';
                btn.setAttribute('aria-label', '已复制');
                setTimeout(() => btn.setAttribute('aria-label', originalLabel), 2000);
            } catch (err) {
                console.error('Failed to copy!', err);
            }
        });
    });
});
</script>

<!-- 2. 本地化樱花特效 (无外部依赖，肯定能用) -->
<!-- ========================================== -->
<script>
(function() {
    // --- 配置区域 ---
    const STOP_TIME = 15000; // 15秒后停止
    const NUMBER_OF_LEAVES = 30; // 同时飘落的樱花数量 (不要太多，否则卡)
    
    // 只有在屏幕宽度大于 768px (电脑端) 时运行，避免手机端遮挡内容
    if (window.innerWidth < 768) return;

    var container = document.createElement('div');
    container.id = "sakura-container";
    container.style.position = 'fixed';
    container.style.top = '0';
    container.style.left = '0';
    container.style.width = '100%';
    container.style.height = '100%';
    container.style.pointerEvents = 'none'; // 让樱花不挡鼠标点击
    container.style.zIndex = '9999';
    document.body.appendChild(container);

    function createLeaf() {
        var leaf = document.createElement('div');
        // 使用 CSS 绘制樱花瓣 (粉色椭圆)
        leaf.style.position = 'absolute';
        leaf.style.width = (Math.random() * 10 + 10) + 'px'; // 10~20px
        leaf.style.height = (Math.random() * 5 + 5) + 'px';
        leaf.style.background = 'linear-gradient(to bottom right, #ffc0cb, #ffb6c1)';
        leaf.style.borderRadius = '10px 0'; // 樱花形状
        leaf.style.opacity = Math.random() * 0.5 + 0.3;
        leaf.style.top = '-20px';
        leaf.style.left = Math.random() * 100 + '%';
        
        // 动画参数
        var duration = Math.random() * 5 + 5 + 's'; // 5~10秒飘落时间
        var delay = Math.random() * 5 + 's';
        
        leaf.style.transition = `top ${duration} linear, transform ${duration} ease-in-out, opacity ${duration}`;
        container.appendChild(leaf);

        // 强制回流触发动画
        setTimeout(function() {
            leaf.style.top = '110%'; // 飘到底部
            leaf.style.transform = `rotate(${Math.random() * 360}deg) translateX(${Math.random() * 100 - 50}px)`;
            leaf.style.opacity = '0';
        }, 100);

        // 动画结束后移除元素
        setTimeout(function() {
            leaf.remove();
        }, parseFloat(duration) * 1000 + 1000);
    }

    // 开始生成樱花
    var interval = setInterval(function() {
        if (document.getElementById('sakura-container')) {
            createLeaf();
        }
    }, 400); // 每0.4秒生成一片

    // --- 定时停止逻辑 ---
    setTimeout(function() {
        clearInterval(interval); // 停止生成新樱花
        
        // 现有的樱花让它飘完，然后移除容器
        setTimeout(function() {
            if(container) container.remove();
            console.log("樱花已落尽。");
        }, 10000); // 给10秒缓冲时间让剩下的飘完
        
    }, STOP_TIME);

})();
</script>

<!-- 3. 深色/浅色切换：随机动画效果（10种） -->
<!-- ========================================== -->
<script>
(function() {
    // 辅助：生成 polygon 起点（所有顶点收束到按钮位置）
    function pt(n, x, y, w, h) {
        var c = (x/w*100).toFixed(1) + '% ' + (y/h*100).toFixed(1) + '%';
        return 'polygon(' + Array(n).fill(c).join(', ') + ')';
    }

    // 丝滑缓动曲线
    var silk  = 'cubic-bezier(0.22, 1, 0.36, 1)';   // ease-out-quint：最丝滑
    var snap  = 'cubic-bezier(0.33, 1, 0.68, 1)';   // ease-out-cubic：干脆

    var effects = [
        // ① 经典圆形扩散
        function(x, y, r) {
            return { kf: { clipPath: [
                'circle(0px at '+x+'px '+y+'px)',
                'circle('+r+'px at '+x+'px '+y+'px)'
            ]}, dur: 380, ease: silk };
        },

        // ② 椭圆拉伸 —— 从一个点拉成巨型椭圆
        function(x, y, r) {
            return { kf: { clipPath: [
                'ellipse(0px 0px at '+x+'px '+y+'px)',
                'ellipse('+(r*1.2)+'px '+r+'px at '+x+'px '+y+'px)'
            ]}, dur: 420, ease: silk };
        },

        // ③ 菱形扩散 —— 钻石般的几何感
        function(x, y, r, w, h) {
            return { kf: { clipPath: [
                pt(4, x, y, w, h),
                'polygon(50% -50%, 150% 50%, 50% 150%, -50% 50%)'
            ]}, dur: 400, ease: silk };
        },

        // ④ 对角线擦除 —— 从按钮所在角落斜切全屏
        function(x, y, r, w, h) {
            var l = x < w/2, t = y < h/2;
            var sx = l ? '-5%' : '105%', sy = t ? '-5%' : '105%';
            var ex = l ? '200%' : '-100%', ey = t ? '200%' : '-100%';
            return { kf: { clipPath: [
                'polygon('+sx+' '+sy+', '+sx+' '+sy+', '+sx+' '+sy+', '+sx+' '+sy+')',
                'polygon('+sx+' '+sy+', '+ex+' '+sy+', '+ex+' '+ey+', '+sx+' '+ey+')'
            ]}, dur: 400, ease: snap };
        },

        // ⑤ 漩涡传送门 —— 圆形扩散 + 旋转，像打开次元门
        function(x, y, r) {
            return { kf: {
                clipPath: [
                    'circle(0px at '+x+'px '+y+'px)',
                    'circle('+r+'px at '+x+'px '+y+'px)'
                ],
                transform: ['rotate(0deg)', 'rotate(90deg)']
            }, dur: 520, ease: silk };
        },

        // ⑥ 星形爆炸 —— 四角星从按钮位置炸开
        function(x, y, r, w, h) {
            return { kf: { clipPath: [
                pt(8, x, y, w, h),
                'polygon(50% -50%, 62% 38%, 150% 50%, 62% 62%, 50% 150%, 38% 62%, -50% 50%, 38% 38%)'
            ]}, dur: 460, ease: silk };
        },

        // ⑦ 圆角药丸 —— 从屏幕中心膨胀的胶囊形状
        function() {
            return { kf: { clipPath: [
                'inset(50% 50% 50% 50% round 50%)',
                'inset(0% 0% 0% 0% round 0%)'
            ]}, dur: 400, ease: silk };
        },

        // ⑧ 水滴流体 —— 有机的不规则扩散
        function(x, y, r, w, h) {
            return { kf: { clipPath: [
                pt(8, x, y, w, h),
                'polygon(-12% 28%, 22% -18%, 62% -8%, 118% 22%, 122% 72%, 78% 118%, 22% 112%, -18% 68%)'
            ]}, dur: 460, ease: silk };
        },

        // ⑨ 横向推拉 —— 根据按钮位置从左或右推开
        function(x, y, r, w) {
            var fromL = x < w/2;
            return { kf: { clipPath: fromL
                ? ['inset(0% 100% 0% 0%)', 'inset(0% 0% 0% 0%)']
                : ['inset(0% 0% 0% 100%)', 'inset(0% 0% 0% 0%)']
            }, dur: 360, ease: snap };
        },

        // ⑩ 蜂巢六边形 —— 科技感
        function(x, y, r, w, h) {
            return { kf: { clipPath: [
                pt(6, x, y, w, h),
                'polygon(50% -45%, 135% 2%, 135% 98%, 50% 145%, -35% 98%, -35% 2%)'
            ]}, dur: 420, ease: silk };
        }
    ];

    var lastIdx = -1;

    document.addEventListener('click', function(e) {
        var btn = e.target.closest('#theme-toggle');
        if (!btn) return;
        e.stopPropagation();

        var html = document.documentElement;
        var isDark = html.dataset.theme === 'dark';
        var newTheme = isDark ? 'light' : 'dark';

        var rect = btn.getBoundingClientRect();
        var x = rect.left + rect.width / 2;
        var y = rect.top  + rect.height / 2;
        var w = window.innerWidth, h = window.innerHeight;
        var R = Math.hypot(Math.max(x, w - x), Math.max(y, h - y));

        if (!document.startViewTransition ||
            window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            html.dataset.theme = newTheme;
            localStorage.setItem('pref-theme', newTheme);
            return;
        }

        var transition = document.startViewTransition(function() {
            html.dataset.theme = newTheme;
            localStorage.setItem('pref-theme', newTheme);
        });

        transition.ready.then(function() {
            var isNowDark = (newTheme === 'dark');

            // 随机选效果（不与上次重复）
            var idx;
            do { idx = Math.floor(Math.random() * effects.length); }
            while (idx === lastIdx && effects.length > 1);
            lastIdx = idx;

            var fx = effects[idx](x, y, R, w, h);

            // 构建 keyframes：暗色模式反转方向
            var keyframes = {};
            Object.keys(fx.kf).forEach(function(prop) {
                keyframes[prop] = isNowDark ? fx.kf[prop].slice().reverse() : fx.kf[prop];
            });

            document.documentElement.animate(keyframes, {
                duration: fx.dur,
                easing:   fx.ease,
                fill:     'forwards',
                pseudoElement: isNowDark
                    ? '::view-transition-old(root)'
                    : '::view-transition-new(root)'
            });
        });
    }, true);
})();
</script>

<!-- 3.5 智能导航栏：上滑显示，下滑隐藏 -->
<!-- ========================================== -->
<script>
(function() {
    var header = document.querySelector('.header');
    if (!header) return;
    var progressBar = document.querySelector('.progress-bar');
    var lastY = window.scrollY;
    var ticking = false;
    var threshold = 5;

    function update() {
        var currentY = window.scrollY;
        if (currentY <= 10) {
            header.classList.remove('header-hidden');
        } else if (currentY > lastY + threshold) {
            header.classList.add('header-hidden');
        } else if (currentY < lastY - threshold) {
            header.classList.remove('header-hidden');
        }
        // 同步进度条位置
        if (progressBar) {
            progressBar.style.top = header.classList.contains('header-hidden') ? '0' : '';
        }
        lastY = currentY;
        ticking = false;
    }

    window.addEventListener('scroll', function() {
        if (!ticking) {
            window.requestAnimationFrame(update);
            ticking = true;
        }
    }, { passive: true });
})();
</script>

<!-- 4. Lightbox 图片灯箱 -->
<!-- ========================================== -->
<script>
(function() {
    var overlay = document.getElementById('lightbox-overlay');
    if (!overlay) return;
    var lbImg = overlay.querySelector('.lightbox-img');

    document.querySelectorAll('.post-content img').forEach(function(img) {
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', function(e) {
            e.preventDefault();
            lbImg.src = this.src;
            lbImg.alt = this.alt || '';
            overlay.classList.add('active');
            overlay.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        });
    });

    function closeLightbox() {
        overlay.classList.remove('active');
        overlay.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
    }

    overlay.addEventListener('click', function(e) {
        if (e.target !== lbImg) closeLightbox();
    });
    overlay.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.classList.contains('active')) closeLightbox();
    });
})();
</script>

<!-- 5. Giscus 评论主题跟随切换 -->

<script>
(function() {
    var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(m) {
            if (m.attributeName === 'data-theme') {
                var theme = document.documentElement.getAttribute('data-theme') === 'dark'
                    ? 'dark_protanopia' : 'light_protanopia';
                var iframe = document.querySelector('iframe.giscus-frame');
                if (iframe) {
                    iframe.contentWindow.postMessage(
                        { giscus: { setConfig: { theme: theme } } },
                        'https://giscus.app'
                    );
                }
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
})();
</script>

<!-- 6. 首页打字机效果 -->
<!-- ========================================== -->
<script>
(function() {
    var container = document.getElementById('typewriter-content');
    if (!container) return;
    var target = container.querySelector('p') || container;
    var text = target.textContent.trim();
    if (!text) return;

    target.textContent = '';
    var cursor = document.createElement('span');
    cursor.className = 'typewriter-cursor';
    cursor.innerHTML = '\u00a0';
    target.appendChild(cursor);

    var i = 0;
    function type() {
        if (i < text.length) {
            target.insertBefore(document.createTextNode(text.charAt(i)), cursor);
            i++;
            setTimeout(type, 80);
        } else {
            setTimeout(function() { cursor.style.display = 'none'; }, 3000);
        }
    }
    type();
})();
</script>

<!-- 7. 搜索标签筛选增强 -->
<!-- ========================================== -->
<script>
(function() {
    var filterContainer = document.getElementById('searchTagFilter');
    var chipsContainer = document.getElementById('tagChips');
    if (!filterContainer || !chipsContainer) return;

    var searchData = null;
    var activeTag = null;

    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            searchData = JSON.parse(xhr.responseText);
            renderTagChips();
        }
    };
    xhr.open('GET', '../index.json');
    xhr.send();

    function renderTagChips() {
        var tagCounts = {};
        searchData.forEach(function(item) {
            (item.tags || []).forEach(function(tag) {
                tagCounts[tag] = (tagCounts[tag] || 0) + 1;
            });
            (item.categories || []).forEach(function(cat) {
                tagCounts[cat] = (tagCounts[cat] || 0) + 1;
            });
        });

        var sorted = Object.keys(tagCounts).sort(function(a, b) {
            return tagCounts[b] - tagCounts[a];
        });

        sorted.forEach(function(tag) {
            var chip = document.createElement('button');
            chip.className = 'tag-chip';
            chip.textContent = tag + ' (' + tagCounts[tag] + ')';
            chip.dataset.tag = tag;
            chip.addEventListener('click', function() { toggleTag(tag, chip); });
            chipsContainer.appendChild(chip);
        });

        filterContainer.style.display = '';
    }

    function toggleTag(tag, chip) {
        var resList = document.getElementById('searchResults');
        if (activeTag === tag) {
            activeTag = null;
            chip.classList.remove('active');
            resList.innerHTML = '';
            return;
        }

        chipsContainer.querySelectorAll('.tag-chip').forEach(function(c) {
            c.classList.remove('active');
        });
        activeTag = tag;
        chip.classList.add('active');

        var results = searchData.filter(function(item) {
            return (item.tags || []).includes(tag) || (item.categories || []).includes(tag);
        });

        var html = '';
        results.forEach(function(item) {
            html += '<li class="post-entry"><header class="entry-header">' +
                item.title + '&nbsp;&raquo;</header>' +
                '<a href="' + item.permalink + '" aria-label="' +
                item.title.replace(/"/g, '&quot;') + '"></a></li>';
        });
        resList.innerHTML = html;
    }

    // 用户输入搜索时清除标签筛选
    var sInput = document.getElementById('searchInput');
    if (sInput) {
        sInput.addEventListener('input', function() {
            if (activeTag) {
                activeTag = null;
                chipsContainer.querySelectorAll('.tag-chip').forEach(function(c) {
                    c.classList.remove('active');
                });
            }
        });
    }
})();
</script>

<!-- 10. 键盘快捷键导航 -->
<!-- ========================================== -->
<script>
(function() {
    document.addEventListener('keydown', function(e) {
        // 在输入框中不触发
        var tag = (e.target.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea' || e.target.isContentEditable) return;
        // 有修饰键不触发
        if (e.ctrlKey || e.altKey || e.metaKey) return;

        switch(e.key) {
            // j = 下一篇文章
            case 'j':
                var next = document.querySelector('.paginav .next');
                if (next) { e.preventDefault(); next.click(); }
                break;
            // k = 上一篇文章
            case 'k':
                var prev = document.querySelector('.paginav .prev');
                if (prev) { e.preventDefault(); prev.click(); }
                break;
            // / = 聚焦搜索框
            case '/':
                var search = document.getElementById('searchInput');
                if (search) {
                    e.preventDefault();
                    search.focus();
                } else {
                    // 不在搜索页时跳转到搜索页
                    var searchLink = document.querySelector('a[href*="search"]');
                    if (searchLink) { e.preventDefault(); searchLink.click(); }
                }
                break;
            // r = 随机文章
            case 'r':
                var randomLink = document.querySelector('a[href*="random"]');
                if (randomLink) { e.preventDefault(); randomLink.click(); }
                break;
        }
    });
})();
</script>

<!-- 11. 时间问候语 -->

<script>
(function() {
    var el = document.querySelector('.home-info .entry-header h1');
    if (!el) return;
    var h = new Date().getHours();
    var greeting = '';
    if (h >= 0 && h < 5)        greeting = '\ud83c\udf19 \u591c\u6df1\u4e86\uff0c\u6ce8\u610f\u4f11\u606f\u54e6';
    else if (h >= 5 && h < 9)   greeting = '\u2600\ufe0f \u65e9\u4e0a\u597d\uff0c\u65b0\u7684\u4e00\u5929';
    else if (h >= 9 && h < 12)  greeting = '\ud83d\udcbb \u4e0a\u5348\u597d\uff0c\u5f00\u59cb\u5b66\u4e60';
    else if (h >= 12 && h < 14) greeting = '\ud83c\udf5c \u4e2d\u5348\u597d\uff0c\u8bb0\u5f97\u5403\u996d';
    else if (h >= 14 && h < 18) greeting = '\u2615 \u4e0b\u5348\u597d\uff0c\u6765\u676f\u5496\u5561';
    else if (h >= 18 && h < 22) greeting = '\ud83c\udf03 \u665a\u4e0a\u597d\uff0c\u8f7b\u677e\u4e00\u4e0b';
    else                         greeting = '\ud83c\udf19 \u591c\u6df1\u4e86\uff0c\u6ce8\u610f\u4f11\u606f\u54e6';
    var badge = document.createElement('span');
    badge.style.cssText = 'display:inline-block;font-size:13px;font-weight:400;color:var(--secondary);margin-left:10px;opacity:0;transition:opacity .6s';
    badge.textContent = greeting;
    el.appendChild(badge);
    requestAnimationFrame(function() { badge.style.opacity = '1'; });
})();
</script>

<!-- ========================================== -->
<!-- 13. 建站天数计时器 -->
<!-- ========================================== -->
<script>
(function() {
    var el = document.getElementById('site-uptime');
    if (!el) return;
    // 建站日期：2026-01-15
    var start = new Date(2026, 0, 15).getTime();
    function update() {
        var diff = Date.now() - start;
        var d = Math.floor(diff / 86400000);
        var h = Math.floor((diff % 86400000) / 3600000);
        var m = Math.floor((diff % 3600000) / 60000);
        el.textContent = d + ' \u5929 ' + h + ' \u5c0f\u65f6 ' + m + ' \u5206\u949f';
    }
    update();
    setInterval(update, 60000);
})();
</script>

<!-- 14. 鼠标挂机小猫：30秒不动探头，动了缩回 -->

<script>
(function() {
    if (window.innerWidth < 768) return;

    var IDLE_MS = 10000;
    var timer = null;
    var visible = false;

    // 创建猫容器
    var cat = document.createElement('div');
    cat.setAttribute('aria-hidden', 'true');
    cat.style.cssText = 'position:fixed;bottom:-60px;right:40px;z-index:9997;pointer-events:none;'
        + 'transition:bottom .6s cubic-bezier(.34,1.56,.64,1);will-change:bottom';

    // SVG 猫咪：探头 + 两只前爪趴在边缘
    cat.innerHTML = '<svg viewBox="0 0 120 100" width="120" height="100" xmlns="http://www.w3.org/2000/svg">'
        // 前爪（趴在屏幕底边上）
        + '<ellipse cx="38" cy="88" rx="12" ry="7" fill="var(--primary)" opacity=".18"/>'
        + '<ellipse cx="82" cy="88" rx="12" ry="7" fill="var(--primary)" opacity=".18"/>'
        + '<path d="M28 90 Q30 78 38 76 Q46 78 48 90" fill="var(--secondary)" stroke="var(--primary)" stroke-width="1.5"/>'
        + '<path d="M72 90 Q74 78 82 76 Q90 78 92 90" fill="var(--secondary)" stroke="var(--primary)" stroke-width="1.5"/>'
        // 肉垫
        + '<ellipse cx="38" cy="85" rx="3" ry="2" fill="var(--primary)" opacity=".25"/>'
        + '<ellipse cx="82" cy="85" rx="3" ry="2" fill="var(--primary)" opacity=".25"/>'
        // 头
        + '<ellipse cx="60" cy="52" rx="28" ry="24" fill="var(--secondary)" stroke="var(--primary)" stroke-width="1.8"/>'
        // 耳朵
        + '<path d="M36 38 L30 14 L48 30 Z" fill="var(--secondary)" stroke="var(--primary)" stroke-width="1.8" stroke-linejoin="round"/>'
        + '<path d="M84 38 L90 14 L72 30 Z" fill="var(--secondary)" stroke="var(--primary)" stroke-width="1.8" stroke-linejoin="round"/>'
        // 内耳
        + '<path d="M37 35 L33 18 L46 31 Z" fill="var(--primary)" opacity=".12"/>'
        + '<path d="M83 35 L87 18 L74 31 Z" fill="var(--primary)" opacity=".12"/>'
        // 眼睛
        + '<g class="idle-cat-eyes">'
        + '<ellipse cx="48" cy="50" rx="5" ry="5.5" fill="var(--primary)"/>'
        + '<ellipse cx="72" cy="50" rx="5" ry="5.5" fill="var(--primary)"/>'
        + '<ellipse cx="49" cy="48.5" rx="2" ry="2" fill="var(--secondary)"/>'
        + '<ellipse cx="73" cy="48.5" rx="2" ry="2" fill="var(--secondary)"/>'
        + '</g>'
        // 鼻子
        + '<path d="M58 56 L60 59 L62 56 Z" fill="var(--primary)" opacity=".5"/>'
        // 嘴
        + '<path d="M60 59 Q56 63 52 60" fill="none" stroke="var(--primary)" stroke-width="1.2" stroke-linecap="round" opacity=".45"/>'
        + '<path d="M60 59 Q64 63 68 60" fill="none" stroke="var(--primary)" stroke-width="1.2" stroke-linecap="round" opacity=".45"/>'
        // 胡须
        + '<line x1="20" y1="52" x2="42" y2="54" stroke="var(--primary)" stroke-width="1" opacity=".3"/>'
        + '<line x1="20" y1="58" x2="42" y2="58" stroke="var(--primary)" stroke-width="1" opacity=".3"/>'
        + '<line x1="78" y1="54" x2="100" y2="52" stroke="var(--primary)" stroke-width="1" opacity=".3"/>'
        + '<line x1="78" y1="58" x2="100" y2="58" stroke="var(--primary)" stroke-width="1" opacity=".3"/>'
        + '</svg>';

    document.body.appendChild(cat);

    function show() {
        if (visible) return;
        visible = true;
        cat.style.bottom = '-10px';
    }

    function hide() {
        if (!visible) return;
        visible = false;
        cat.style.bottom = '-60px';
    }

    function resetTimer() {
        hide();
        clearTimeout(timer);
        timer = setTimeout(show, IDLE_MS);
    }

    ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart'].forEach(function(evt) {
        document.addEventListener(evt, resetTimer, { passive: true });
    });

    timer = setTimeout(show, IDLE_MS);
})();
</script>

<!-- ========================================== -->
<!-- 15. 文章卡片 3D 倾斜 hover 效果 (桌面端) -->
<!-- ========================================== -->
<script>
(function() {
    if (window.innerWidth < 768) return;

    var MAX_DEG = 4;

    document.querySelectorAll('.post-entry').forEach(function(card) {
        card.style.transition = 'transform .2s ease-out, box-shadow .2s ease-out';
        card.style.willChange = 'transform';
        card.style.transformStyle = 'preserve-3d';

        card.addEventListener('mousemove', function(e) {
            var rect = card.getBoundingClientRect();
            // 鼠标在卡片中的相对位置 -0.5 ~ 0.5
            var x = (e.clientX - rect.left) / rect.width  - 0.5;
            var y = (e.clientY - rect.top)  / rect.height - 0.5;
            // 倾斜方向：鼠标在右侧 → 绕 Y 轴正向旋转，鼠标在下方 → 绕 X 轴负向旋转
            var rotateY = (x * MAX_DEG * 2).toFixed(2);
            var rotateX = (-y * MAX_DEG * 2).toFixed(2);
            card.style.transform = 'perspective(600px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) scale(1.01)';
            card.style.boxShadow = (x * -6).toFixed(1) + 'px ' + (y * -6).toFixed(1) + 'px 20px rgba(0,0,0,.08)';
        });

        card.addEventListener('mouseleave', function() {
            card.style.transform = '';
            card.style.boxShadow = '';
        });
    });
})();
</script>
