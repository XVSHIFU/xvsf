{{- define "main" }}
<div class="random-page">
    <div class="random-card" id="random-card">
        <div class="random-icon" aria-hidden="true">
            <svg viewBox="0 0 100 100" width="80" height="80">
                <rect x="10" y="10" width="80" height="80" rx="16" fill="none" stroke="currentColor" stroke-width="4"/>
                <circle cx="35" cy="35" r="6" fill="currentColor"/>
                <circle cx="65" cy="35" r="6" fill="currentColor"/>
                <circle cx="35" cy="65" r="6" fill="currentColor"/>
                <circle cx="65" cy="65" r="6" fill="currentColor"/>
                <circle cx="50" cy="50" r="6" fill="currentColor"/>
            </svg>
        </div>
        <p class="random-kicker">今日抽到</p>
        <h1 id="random-title">正在洗牌...</h1>
        <p id="random-summary" class="random-summary">从文章库里随机挑一篇给你。</p>
        <div id="random-meta" class="random-meta"></div>
        <div class="random-actions">
            <a id="random-open" class="not-found-btn" href="{{ "" | absURL }}">去看看</a>
            <button id="random-redraw" class="not-found-btn random-secondary" type="button">再抽一篇</button>
        </div>
    </div>
</div>
<style>
.random-page {
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}
.random-card {
    width: min(100%, 560px);
    padding: 36px 28px;
    border: 1px solid var(--border);
    border-radius: 18px;
    background: var(--entry);
    box-shadow: 0 12px 36px rgba(0,0,0,0.08);
    transition: transform 0.25s ease, opacity 0.25s ease;
}
.random-card.is-drawing {
    transform: translateY(-6px) rotateX(3deg);
    opacity: 0.7;
}
.random-icon {
    color: var(--link-color);
    margin-bottom: 14px;
}
.random-kicker,
.random-meta,
.random-summary {
    color: var(--secondary);
}
.random-kicker {
    margin: 0 0 8px;
    font-size: 0.9em;
}
.random-card h1 {
    margin: 0 0 12px;
    font-size: clamp(24px, 5vw, 34px);
}
.random-summary {
    margin: 0 auto 14px;
    max-width: 44em;
    line-height: 1.7;
}
.random-meta {
    min-height: 1.5em;
    margin-bottom: 24px;
    font-size: 0.9em;
}
.random-actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}
.random-secondary {
    border: 1px solid var(--border);
    background: var(--theme);
    color: var(--primary);
}
.random-secondary:hover {
    color: var(--primary);
}
</style>
<script>
(function() {
    const card = document.getElementById('random-card');
    const title = document.getElementById('random-title');
    const summary = document.getElementById('random-summary');
    const meta = document.getElementById('random-meta');
    const open = document.getElementById('random-open');
    const redraw = document.getElementById('random-redraw');
    let posts = [];

    function excerpt(post) {
        const raw = post.summary || post.content || '';
        const doc = new DOMParser().parseFromString(raw, 'text/html');
        const text = (doc.body.textContent || raw).replace(/\s+/g, ' ').trim();
        if (!text) return '这篇文章没有摘要，直接翻开看看吧。';
        return text.length > 120 ? text.slice(0, 120) + '...' : text;
    }

    function pickPost() {
        if (!posts.length) return;
        card.classList.add('is-drawing');
        window.setTimeout(function() {
            const pick = posts[Math.floor(Math.random() * posts.length)];
            title.textContent = pick.title || '未命名文章';
            summary.textContent = excerpt(pick);
            meta.textContent = [pick.section, pick.date].filter(Boolean).join(' · ');
            open.href = pick.permalink;
            card.classList.remove('is-drawing');
        }, 220);
    }

    fetch('{{ "random-index.json" | absURL }}')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            posts = Array.isArray(data) ? data.filter(function(item) { return item.permalink; }) : [];
            if (posts.length) {
                pickPost();
            } else {
                title.textContent = '暂无文章';
                summary.textContent = '文章库还没有可抽取的内容。';
                redraw.disabled = true;
            }
        })
        .catch(function() {
            title.textContent = '抽卡失败';
            summary.replaceChildren();
            summary.append('文章列表加载失败，');
            const homeLink = document.createElement('a');
            homeLink.href = '{{ "" | absURL }}';
            homeLink.textContent = '返回首页';
            summary.append(homeLink, '。');
            redraw.disabled = true;
        });

    redraw.addEventListener('click', pickPost);
})();
</script>
{{- end }}
